<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>RPG Maker Cheat Engine</title>
    
    <!-- Load local fonts/icons if available, otherwise fallback to CDN -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
    
    <!-- Vuetify CSS -->
    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
    <link href="./css/main.css" rel="stylesheet">
    
    <style>
        html { overflow-y: auto !important; }
        body { background-color: #121212; margin: 0; color: white; font-family: Roboto, sans-serif; }
        
        .v-application--wrap {
            min-height: 100vh;
        }

        #status-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #121212;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }

        .error-text {
            color: #ff5252;
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 10px;
            background: #2a1a1a;
            padding: 10px;
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div id="status-overlay">
        <div id="status-text">Initializing Cheat Engine...</div>
        <div id="error-display" style="display: none;" class="error-text"></div>
    </div>

    <div id="app" style="display: none;">
        <v-app dark>
            <v-main>
                <cheat-modal v-model="activeComponentName"></cheat-modal>
            </v-main>
            <alert-snackbar></alert-snackbar>
        </v-app>
    </div>

    <!-- Load local libs -->
    <script src="./libs/vue.js"></script>
    <script src="./libs/vuetify.js"></script>
    <script src="./libs/axios.min.js"></script>
    
    <!-- Bridge script -->
    <script type="module" src="./js/window-init.js"></script>
</body>
</html>
