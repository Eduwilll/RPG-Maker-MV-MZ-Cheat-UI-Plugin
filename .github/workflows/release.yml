name: Release

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.22

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release packages
        run: python deploy/main.py --version ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release (Draft)
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          draft: true  # Created as draft — edit release notes before publishing
          generate_release_notes: true  # Auto-generates changelog from commits as starting point
          body: |
            ## What's New in v${{ steps.version.outputs.VERSION }}

            > **Edit this section** with your features, fixes, and changes before publishing.

            ### Features
            -

            ### Bug Fixes
            -

            ### Performance
            -

            ---

            ### Installation
            1. Download the package for your RPG Maker version below
            2. Extract and copy contents to your game directory
            3. Launch game and press **Ctrl + C** for the cheat menu

            | File | For |
            |---|---|
            | `rpg-mv-cheat-${{ steps.version.outputs.VERSION }}-core.tar.gz` | RPG Maker **MV** |
            | `rpg-mz-cheat-${{ steps.version.outputs.VERSION }}-core.tar.gz` | RPG Maker **MZ** |
          files: |
            output/rpg-mv-cheat-${{ steps.version.outputs.VERSION }}-core.tar.gz
            output/rpg-mz-cheat-${{ steps.version.outputs.VERSION }}-core.tar.gz
